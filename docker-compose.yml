version: '3.9'

services:
  app:
    build: ./infra/php
    volumes:
      - ./src:/data # 左がホスト、右がコンテナ内。両方は同じ内容になる

  web:
    image: nginx:1.20-alpine
    ports:
      - 8080:80
    volumes:
      - ./src:/data
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    working_dir: /data

  db:
    build: ./infra/mysql
    volumes:
      - db-store:/var/lib/mysql

volumes:
  db-store: